<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSS Screensaver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap');
  :root { --transition: 2.5s; --slide-duration: 12s; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; width: 100vw; height: 100vh; font-family: 'Outfit', sans-serif; user-select: none; }
  .slide { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; opacity: 0; z-index: 1; overflow: hidden; transition: opacity var(--transition) ease-in-out; }
  .slide.active { opacity: 1; z-index: 2; }
  .slide img { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; will-change: transform; transform-origin: center center; }
  .vignette { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.3) 70%, rgba(0,0,0,0.65) 100%); }
  .bottom-grad { position: fixed; bottom: 0; left: 0; width: 100vw; height: 40vh; z-index: 11; pointer-events: none; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.15) 70%, transparent 100%); }
  .clock { position: fixed; z-index: 20; text-align: right; opacity: 0; transition: opacity 1s ease; }
  .clock.visible { opacity: 1; }
  .clock-time { color: rgba(255,255,255,0.88); font-size: 3.6rem; font-weight: 200; letter-spacing: 0.06em; text-shadow: 0 2px 24px rgba(0,0,0,0.9); line-height: 1; }
  .clock-date { color: rgba(255,255,255,0.45); font-size: 1.05rem; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 6px; text-shadow: 0 1px 12px rgba(0,0,0,0.8); }
  .game-info { position: fixed; z-index: 20; max-width: 60vw; opacity: 0; transform: translateY(12px); transition: opacity 1.2s ease, transform 1.2s ease; }
  .game-info.visible { opacity: 1; transform: translateY(0); }
  .game-name { font-size: 2.6rem; font-weight: 500; color: rgba(255,255,255,0.95); text-shadow: 0 2px 20px rgba(0,0,0,0.9); line-height: 1.15; margin-bottom: 10px; }
  .game-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: 400; letter-spacing: 0.04em; text-shadow: 0 1px 8px rgba(0,0,0,0.7); }
  .badge-installed { background: rgba(76,175,80,0.25); color: rgba(76,175,80,0.95); border: 1px solid rgba(76,175,80,0.3); }
  .badge-not-installed { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.1); }
  .badge-genre { background: rgba(88,166,255,0.15); color: rgba(88,166,255,0.9); border: 1px solid rgba(88,166,255,0.2); font-size: 0.78rem; padding: 3px 9px; }
  .badge-meta { background: rgba(255,193,7,0.2); color: rgba(255,193,7,0.95); border: 1px solid rgba(255,193,7,0.3); font-weight: 600; }
  .badge-vr { background: rgba(156,39,176,0.25); color: rgba(206,147,216,0.95); border: 1px solid rgba(156,39,176,0.3); }
  .badge-dim { background: rgba(128,128,128,0.15); color: rgba(180,180,180,0.5); border: 1px solid rgba(128,128,128,0.15); }
  .badge-deck-v { background: rgba(76,175,80,0.25); color: rgba(129,199,132,0.95); border: 1px solid rgba(76,175,80,0.3); }
  .badge-deck-p { background: rgba(255,193,7,0.25); color: rgba(255,213,79,0.95); border: 1px solid rgba(255,193,7,0.3); }
  .badge-deck-u { background: rgba(244,67,54,0.25); color: rgba(229,115,115,0.95); border: 1px solid rgba(244,67,54,0.3); }
  .badge-pdb-platinum { background: rgba(224,224,224,0.2); color: rgba(224,224,224,0.95); border: 1px solid rgba(224,224,224,0.25); }
  .badge-pdb-gold { background: rgba(255,215,0,0.2); color: rgba(255,213,79,0.95); border: 1px solid rgba(255,215,0,0.25); }
  .badge-pdb-silver { background: rgba(192,192,192,0.2); color: rgba(189,189,189,0.95); border: 1px solid rgba(192,192,192,0.25); }
  .badge-pdb-bronze { background: rgba(205,127,50,0.2); color: rgba(212,167,106,0.95); border: 1px solid rgba(205,127,50,0.25); }
  .badge-pdb-borked { background: rgba(244,67,54,0.2); color: rgba(229,115,115,0.95); border: 1px solid rgba(244,67,54,0.25); }
  .badge-controller { background: rgba(0,150,136,0.2); color: rgba(128,203,196,0.95); border: 1px solid rgba(0,150,136,0.3); }
  .meta-text { color: rgba(255,255,255,0.55); font-size: 0.9rem; font-weight: 300; text-shadow: 0 1px 8px rgba(0,0,0,0.7); }
  .meta-dim { color: rgba(255,255,255,0.35); font-size: 0.82rem; font-weight: 300; font-style: italic; }
  .meta-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.2); }
  .meta-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 6px; }
  .meta-row:first-child { margin-top: 0; }
  .meta-row.row-sm .badge { font-size: 0.7rem; padding: 2px 8px; }
  .meta-row.row-sm .meta-text { font-size: 0.75rem; }
  .meta-row.row-sm .meta-dim { font-size: 0.68rem; }
  .meta-row.row-sm .meta-divider { height: 10px; }
  .meta-row.row-lg .badge { font-size: 1rem; padding: 6px 14px; }
  .meta-row.row-lg .meta-text { font-size: 1.05rem; }
  .meta-row.row-lg .meta-dim { font-size: 0.95rem; }
  .meta-row.row-lg .meta-divider { height: 18px; }
  .meta-row.row-mono .badge { background: rgba(255,255,255,0.08) !important; color: rgba(255,255,255,0.55) !important; border-color: rgba(255,255,255,0.12) !important; }
  .meta-row.row-mono .meta-text { color: rgba(255,255,255,0.45); }
  .meta-row.row-mono .meta-dim { color: rgba(255,255,255,0.3); }
  .meta-row.row-mono .badge { filter: grayscale(1); }
  .meta-row.row-mono .meta-text { filter: grayscale(1); }
  .loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 1.2rem; font-weight: 200; letter-spacing: 0.2em; transition: opacity 1s ease; }
  .loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div class="loading" id="loading">LOADING LIBRARY...</div>
<div class="vignette"></div>
<div class="bottom-grad"></div>
<div class="slide" id="slide-a"><img id="img-a" alt=""></div>
<div class="slide" id="slide-b"><img id="img-b" alt=""></div>
<div class="clock" id="clock"><div class="clock-time" id="clock-time"></div><div class="clock-date" id="clock-date"></div></div>
<div class="game-info" id="game-info"><div class="game-name" id="game-name"></div></div>
<script>
(function() {
  'use strict';
  let CONFIG = { screensaver_slide_duration_seconds:12, screensaver_transition_seconds:2.5, screensaver_title_delay_seconds:3, ken_burns_intensity:0.7, display_elements:[] };
  const KB = ['kb1','kb2','kb3','kb4','kb5','kb6','kb7','kb8'];
  let games=[], idx=0, active='a', slideT=null, titleT=null, enabledElements=[], rowStyles=[];

  function buildKB(s) {
    const st = document.getElementById('kb-style') || document.createElement('style');
    st.id = 'kb-style';
    // s = intensity 0-1. For 16:9 on 16:9: zoom in first to create pan margin.
    // Base zoom = 1.05 + intensity * 0.10 (range 1.05 - 1.15)
    // Pan by shifting transform-origin edge-to-edge within that zoom overflow.
    const base = (1.05 + s * 0.10).toFixed(3);
    const hi = (1.08 + s * 0.12).toFixed(3);
    const lo = (1.03 + s * 0.07).toFixed(3);
    st.textContent = `
      @keyframes kb1{from{transform:scale(${base});transform-origin:0% 50%}to{transform:scale(${hi});transform-origin:100% 50%}}
      @keyframes kb2{from{transform:scale(${hi});transform-origin:100% 40%}to{transform:scale(${base});transform-origin:0% 60%}}
      @keyframes kb3{from{transform:scale(${base});transform-origin:10% 20%}to{transform:scale(${hi});transform-origin:90% 80%}}
      @keyframes kb4{from{transform:scale(${hi});transform-origin:90% 50%}to{transform:scale(${lo});transform-origin:10% 50%}}
      @keyframes kb5{from{transform:scale(${base});transform-origin:50% 0%}to{transform:scale(${hi});transform-origin:50% 100%}}
      @keyframes kb6{from{transform:scale(${lo});transform-origin:0% 50%}to{transform:scale(${hi});transform-origin:100% 50%}}
      @keyframes kb7{from{transform:scale(${hi});transform-origin:100% 30%}to{transform:scale(${lo});transform-origin:0% 70%}}
      @keyframes kb8{from{transform:scale(${base});transform-origin:30% 30%}to{transform:scale(${hi});transform-origin:70% 70%}}`;
    if(!st.parentNode) document.head.appendChild(st);
  }

  // Display element renderers - each returns array of DOM nodes or empty
  const RENDERERS = {
    installed_badge(g,m) {
      if(g.installed_htpc) m.appendChild(badge('badge-installed','\u2713 Installed'));
      else if(!g.ever_played) m.appendChild(badge('badge-not-installed','Never installed'));
      else m.appendChild(badge('badge-not-installed','Not installed'));
    },
    playtime(g,m) {
      if(g.playtime_hours>0) { addDiv(m); m.appendChild(meta(g.playtime_hours>=1?g.playtime_hours+'h played':Math.round(g.playtime_hours*60)+'m played')); }
      else { addDiv(m); m.appendChild(meta('Never played')); }
    },
    device_breakdown(g,m) {
      if(g.playtime_hours<=0) return;
      const d=[];
      if(g.playtime_windows_hours>0) d.push('PC '+g.playtime_windows_hours+'h');
      if(g.playtime_deck_hours>0) d.push('Deck '+g.playtime_deck_hours+'h');
      if(g.playtime_linux_hours>0) d.push('Linux '+g.playtime_linux_hours+'h');
      if(d.length){ addDiv(m); m.appendChild(meta(d.join(' \u00b7 '))); }
    },
    last_played(g,m) {
      if(g.last_played){ addDiv(m); m.appendChild(meta('Last: '+g.last_played)); }
    },
    genres(g,m) {
      if(!g.genres||!g.genres.length) return;
      addDiv(m);
      g.genres.slice(0,3).forEach(t=>m.appendChild(badge('badge-genre',t)));
    },
    developer(g,m) {
      if(!g.developer) return;
      addDiv(m); m.appendChild(metaDim(g.developer));
    },
    metacritic(g,m) {
      if(!g.metacritic_score) return;
      addDiv(m); m.appendChild(badge('badge-meta','\u2605 '+g.metacritic_score));
    },
    release_date(g,m) {
      if(!g.release_date) return;
      addDiv(m); m.appendChild(metaDim(g.release_date));
    },
    description(g,m) {
      if(!g.short_description) return;
      addDiv(m);
      const d=document.createElement('span');
      d.className='meta-dim';
      d.style.cssText='max-width:50vw;line-height:1.4';
      d.textContent=g.short_description;
      m.appendChild(d);
    },
    controller_support(g,m) {
      const cs=g.controller_support||'none';
      const labels={'full':'\uD83C\uDFAE Full Controller','partial':'\uD83C\uDFAE Partial Controller','none':'\uD83C\uDFAE No Controller'};
      const cls={'full':'badge-controller','partial':'badge-controller','none':'badge-dim'};
      addDiv(m); m.appendChild(badge(cls[cs]||'badge-dim',labels[cs]||'\uD83C\uDFAE '+cs));
    },
    vr_support(g,m) {
      if(g.vr_support){
        addDiv(m); m.appendChild(badge('badge-vr','\uD83E\uDD7D VR Supported'));
      } else {
        addDiv(m); m.appendChild(badge('badge-dim','\uD83E\uDD7D No VR'));
      }
    },
    platforms(g,m) {
      if(!g.native_platforms) return;
      const p=g.native_platforms, parts=[];
      if(p.windows) parts.push('Win');
      if(p.linux) parts.push('Linux');
      if(p.mac) parts.push('Mac');
      if(parts.length>0){ addDiv(m); m.appendChild(metaDim(parts.join(' / '))); }
    },
    deck_verified(g,m) {
      const d=g.deck_verified||0;
      const labels={3:'\u2705 Deck Verified',2:'\u26A0\uFE0F Deck Playable',1:'\u274C Deck Unsupported',0:'\u2753 Deck Untested'};
      const cls={3:'badge-deck-v',2:'badge-deck-p',1:'badge-deck-u',0:'badge-dim'};
      addDiv(m); m.appendChild(badge(cls[d]||'badge-dim',labels[d]||'Deck Unknown'));
    },
    protondb(g,m) {
      if(!g.protondb_tier||g.protondb_tier==='pending') return;
      const tier=g.protondb_tier;
      const icons={platinum:'\uD83C\uDFC6',gold:'\uD83E\uDD47',silver:'\uD83E\uDD48',bronze:'\uD83E\uDD49',borked:'\uD83D\uDC80'};
      const cls={platinum:'badge-pdb-platinum',gold:'badge-pdb-gold',silver:'badge-pdb-silver',bronze:'badge-pdb-bronze',borked:'badge-pdb-borked'};
      const label=(icons[tier]||'')+' '+(tier.charAt(0).toUpperCase()+tier.slice(1));
      addDiv(m); m.appendChild(badge(cls[tier]||'badge-dim',label));
    }
  };

  function badge(c,t){const e=document.createElement('span');e.className='badge '+c;e.textContent=t;return e}
  function meta(t){const e=document.createElement('span');e.className='meta-text';e.textContent=t;return e}
  function metaDim(t){const e=document.createElement('span');e.className='meta-dim';e.textContent=t;return e}
  function addDiv(m){if(m.children.length){const e=document.createElement('span');e.className='meta-divider';m.appendChild(e)}}

  function applyOverlayPositions() {
    const pos = CONFIG.overlay_positions || {game_info:{bottom:4.4,left:3.5},clock:{bottom:4.4,right:3.5}};
    const gi = document.getElementById('game-info');
    const cl = document.getElementById('clock');
    // Reset all edges
    [gi, cl].forEach(el => { if(el){el.style.top='auto';el.style.bottom='auto';el.style.left='auto';el.style.right='auto';}});
    if (gi && pos.game_info) {
      Object.entries(pos.game_info).forEach(([k,v]) => gi.style[k] = v + '%');
    }
    if (cl && pos.clock) {
      Object.entries(pos.clock).forEach(([k,v]) => cl.style[k] = v + '%');
      // Align text based on horizontal position
      if ('right' in pos.clock) cl.style.textAlign = 'right';
      else cl.style.textAlign = 'left';
    }
  }

  async function init() {
    try {
      const cr=await fetch('/api/config'); if(cr.ok) CONFIG={...CONFIG,...(await cr.json())};
      document.documentElement.style.setProperty('--transition',CONFIG.screensaver_transition_seconds+'s');
      buildKB(CONFIG.ken_burns_intensity||0.7);
      enabledElements=(CONFIG.display_elements||[]).filter(e=>e.enabled).sort((a,b)=>(a.row||0)-(b.row||0)||a.order-b.order);
      rowStyles=CONFIG.display_row_styles||[{row:0,size:'md',color:true}];
      applyOverlayPositions();
      const gr=await fetch('/api/games'); const all=await gr.json();
      const ssTypes=CONFIG.screensaver_types||['game'];
      const params=new URLSearchParams(window.location.search);
      const isPreview=params.get('preview')==='1';
      let eligible;
      if(isPreview){
        try{
          const stored=localStorage.getItem('pss_preview_appids');
          if(stored){
            const previewIds=new Set(JSON.parse(stored));
            eligible=all.filter(g=>previewIds.has(g.appid));
          }else{
            eligible=all.filter(g=>!g.excluded&&!g.nsfw_auto&&ssTypes.includes(g.type||'game'));
          }
        }catch(e){
          eligible=all.filter(g=>!g.excluded&&!g.nsfw_auto&&ssTypes.includes(g.type||'game'));
        }
      }else{
        eligible=all.filter(g=>!g.excluded&&!g.nsfw_auto&&ssTypes.includes(g.type||'game'));
      }
      for(let i=eligible.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[eligible[i],eligible[j]]=[eligible[j],eligible[i]]}
      games=eligible;
      if(!games.length){document.getElementById('loading').textContent='NO GAMES';return}
      startClock(); preload(0);
    }catch(e){document.getElementById('loading').textContent='LOAD FAILED: '+e.message}
  }

  function startClock(){
    function u(){const n=new Date();document.getElementById('clock-time').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');const d=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('clock-date').textContent=d[n.getDay()]+' '+n.getDate()+' '+m[n.getMonth()]}
    u();setInterval(u,10000);document.getElementById('clock').classList.add('visible');
  }

  function tryImg(g){const mode=CONFIG.image_mode||'selected';const ep=mode==='shuffle'?'/api/image/'+g.appid+'/random':'/api/image/'+g.appid+'/hero';return new Promise(r=>{const i=new Image();i.onload=()=>r(i.src);i.onerror=()=>{const i2=new Image();i2.onload=()=>r(i2.src);i2.onerror=()=>r(null);i2.src=g.header};i.src=ep+(mode==='shuffle'?'?t='+Date.now():'')})}

  async function preload(i){const g=games[i];const url=await tryImg(g);if(!url){next();return}const ld=document.getElementById('loading');if(!ld.classList.contains('hidden'))ld.classList.add('hidden');show(url,g)}

  function show(url,g){
    const nxt=active==='a'?'b':'a';
    const se=document.getElementById('slide-'+nxt), ie=document.getElementById('img-'+nxt);
    ie.src=url;
    const anim=KB[Math.floor(Math.random()*KB.length)];
    const dur=CONFIG.screensaver_slide_duration_seconds;
    ie.style.animation='none'; void ie.offsetHeight;
    ie.style.animation=anim+' '+dur+'s ease-in-out forwards';
    se.classList.add('active');
    document.getElementById('slide-'+active).classList.remove('active');
    active=nxt;
    const info=document.getElementById('game-info');
    info.classList.remove('visible');
    if(titleT) clearTimeout(titleT);
    titleT=setTimeout(()=>{updateInfo(g);info.classList.add('visible')}, (CONFIG.screensaver_title_delay_seconds||3)*1000);
    if(slideT) clearTimeout(slideT);
    slideT=setTimeout(next, dur*1000);
  }

  function next(){idx=(idx+1)%games.length;if(idx===0){for(let i=games.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[games[i],games[j]]=[games[j],games[i]]}}preload(idx)}

  function updateInfo(g){
    const info=document.getElementById('game-info');
    // Remove previous rows
    info.querySelectorAll('.meta-row,.game-meta,div:not(.game-name)').forEach(d=>d.remove());
    document.getElementById('game-name').textContent=g.name;
    // Group elements by row
    const byRow={};
    enabledElements.forEach(el=>{
      const rn=el.row||0;
      if(!byRow[rn]) byRow[rn]=[];
      byRow[rn].push(el);
    });
    const rowNums=Object.keys(byRow).map(Number).sort((a,b)=>a-b);
    rowNums.forEach(rn=>{
      const rs=rowStyles.find(s=>s.row===rn)||{size:'md',color:true};
      const row=document.createElement('div');
      let cls='meta-row';
      if(rs.size==='sm') cls+=' row-sm';
      else if(rs.size==='lg') cls+=' row-lg';
      if(!rs.color) cls+=' row-mono';
      row.className=cls;
      byRow[rn].forEach(el=>{
        if(RENDERERS[el.id]) RENDERERS[el.id](g,row);
      });
      if(row.children.length) info.appendChild(row);
    });
  }

  init();
})();
</script>
</body>
</html>
